<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>培训评价管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        .actions {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .download-link {
            color: #3498db;
            text-decoration: none;
        }
        .download-link:hover {
            text-decoration: underline;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <h1>培训评价管理后台</h1>
        
        <div class="actions">
            <button id="refreshBtn">刷新数据</button>
            <button id="downloadAllBtn">下载全部评价</button>
        </div>
        
        <table id="evaluationTable">
            <thead>
                <tr>
                    <th>序号</th>
                    <th>培训人员</th>
                    <th>部门</th>
                    <th>培训课程</th>
                    <th>培训日期</th>
                    <th>提交时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="evaluationBody">
                <tr>
                    <td colspan="7" class="no-data">加载中...</td>
                </tr>
            </tbody>
        </table>
    </div>
    
<script>
    // Firebase配置
    const firebaseConfig = {
        apiKey: "AIzaSyDFU8nBcUMGAWBtKWO8pz2WfL8vEanwPMc",
        authDomain: "training-evaluation-9ab25.firebaseapp.com",
        databaseURL: "https://training-evaluation-9ab25-default-rtdb.firebaseio.com",
        projectId: "training-evaluation-9ab25",
        storageBucket: "training-evaluation-9ab25.firebasestorage.app",
        messagingSenderId: "163913714869",
        appId: "1:163913714869:web:d3b33718732614adbb02fc",
        measurementId: "G-KL1JV1K0YD"
    };
    
    // 初始化Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // 加载评价数据
    function loadEvaluations() {
        const tbody = document.getElementById('evaluationBody');
        tbody.innerHTML = '<tr><td colspan="7" class="no-data">加载中...</td></tr>';
        
        database.ref('evaluations').once('value')
            .then(function(snapshot) {
                const data = snapshot.val();
                const evaluations = [];
                
                if (data) {
                    Object.keys(data).forEach(function(key) {
                        const item = data[key];
                        item.id = key;
                        evaluations.push(item);
                    });
                    
                    // 按提交时间排序，最新的在前
                    evaluations.sort(function(a, b) {
                        return new Date(b.submitTime) - new Date(a.submitTime);
                    });
                }
                
                tbody.innerHTML = '';
                
                if (evaluations.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="no-data">暂无评价数据</td></tr>';
                    return;
                }
                
                evaluations.forEach(function(item, index) {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${item.traineeName}</td>
                        <td>${item.department}</td>
                        <td>${item.trainingCourse}</td>
                        <td>${item.trainingDate}</td>
                        <td>${new Date(item.submitTime).toLocaleString()}</td>
                        <td><button onclick="downloadEvaluation('${item.id}')" class="download-link">下载</button></td>
                    `;
                    tbody.appendChild(row);
                });
            })
            .catch(function(error) {
                console.error('Error:', error);
                tbody.innerHTML = '<tr><td colspan="7" class="no-data">加载失败，请重试</td></tr>';
            });
    }
    
    // 下载单个评价
    function downloadEvaluation(id) {
        database.ref('evaluations/' + id).once('value')
            .then(function(snapshot) {
                const data = snapshot.val();
                if (data) {
                    // 生成CSV内容
                    const csvContent = "培训人员姓名,部门,培训课程,培训日期,培训内容的实用性,培训讲师的专业水平,培训方法的有效性,培训环境与设施,整体培训满意度,意见与建议,提交时间\n" +
                        `${data.traineeName},${data.department},${data.trainingCourse},${data.trainingDate},${data.contentUtility},${data.instructorLevel},${data.methodEffectiveness},${data.environment},${data.overallSatisfaction},${data.suggestions},${data.submitTime}\n`;
                    
                    // 创建下载链接
                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.setAttribute('download', `评价表_${id}.csv`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            })
            .catch(function(error) {
                console.error('Error:', error);
                alert('下载失败，请稍后重试');
            });
    }
    
    // 下载全部评价
    function downloadAllEvaluations() {
        database.ref('evaluations').once('value')
            .then(function(snapshot) {
                const data = snapshot.val();
                const evaluations = [];
                
                if (data) {
                    Object.keys(data).forEach(function(key) {
                        evaluations.push(data[key]);
                    });
                }
                
                // 生成CSV内容
                let csvContent = "培训人员姓名,部门,培训课程,培训日期,培训内容的实用性,培训讲师的专业水平,培训方法的有效性,培训环境与设施,整体培训满意度,意见与建议,提交时间\n";
                
                evaluations.forEach(function(item) {
                    csvContent += `${item.traineeName},${item.department},${item.trainingCourse},${item.trainingDate},${item.contentUtility},${item.instructorLevel},${item.methodEffectiveness},${item.environment},${item.overallSatisfaction},${item.suggestions},${item.submitTime}\n`;
                });
                
                // 创建下载链接
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.setAttribute('download', `全部评价表_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            })
            .catch(function(error) {
                console.error('Error:', error);
                alert('下载失败，请稍后重试');
            });
    }
    
    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
        loadEvaluations();
        
        document.getElementById('refreshBtn').addEventListener('click', loadEvaluations);
        document.getElementById('downloadAllBtn').addEventListener('click', downloadAllEvaluations);
    });
</script>
</body>
</html>
